<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>视频压缩 - FFmpeg GPU 加速</title>
<style>
:root{--bg:#0f0f0f;--surface:#1a1a1a;--surface-2:#242424;--border:#333;--text:#e0e0e0;--text-secondary:#999;--accent:#3b82f6;--accent-hover:#2563eb;--success:#22c55e;--warning:#f59e0b;--error:#ef4444;--radius:8px;--radius-lg:12px}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);line-height:1.6;min-height:100vh}
.app-container{max-width:1400px;margin:0 auto;padding:24px}
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;padding-bottom:16px;border-bottom:1px solid var(--border);gap:12px}
.header h1{font-size:24px;font-weight:700}.header-right{display:flex;align-items:center;gap:12px}
.server-status{font-size:13px;padding:4px 12px;border-radius:20px;background:var(--surface-2);white-space:nowrap}
.server-status.online{color:var(--success)}.server-status.offline{color:var(--error)}
.lang-btn{font-size:12px;padding:4px 10px;border-radius:20px;background:var(--surface-2);border:1px solid var(--border);color:var(--text-secondary);cursor:pointer;white-space:nowrap;transition:all 0.15s}
.lang-btn:hover{color:var(--text);border-color:var(--accent)}
.hidden{display:none!important}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border:none;border-radius:var(--radius);font-size:14px;font-weight:500;cursor:pointer;transition:all 0.15s}
.btn--primary{background:var(--accent);color:#fff}.btn--primary:hover{background:var(--accent-hover)}.btn--primary:disabled{background:var(--border);color:var(--text-secondary);cursor:not-allowed}
.btn--ghost{background:transparent;color:var(--text);border:1px solid var(--border)}.btn--ghost:hover{background:var(--surface-2)}
.btn--danger{background:transparent;color:var(--error);border:1px solid var(--error)}.btn--danger:hover{background:#3b1111}
.btn--small{padding:4px 10px;font-size:12px}.btn--icon{padding:6px;background:transparent;border:none;color:var(--text-secondary);cursor:pointer;border-radius:var(--radius)}.btn--icon:hover{color:var(--text);background:var(--surface-2)}
.drop-zone{border:2px dashed var(--border);border-radius:var(--radius-lg);padding:48px;text-align:center;transition:all 0.2s;margin-bottom:24px}
.drop-zone.active{border-color:var(--accent);background:rgba(59,130,246,0.08)}.drop-zone__icon{font-size:48px;display:block;margin-bottom:12px}.drop-zone p{margin-bottom:8px}.drop-zone__hint{font-size:13px;color:var(--text-secondary);margin-bottom:16px}
.queue-section{margin-bottom:24px}.queue-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}.queue-header h2{font-size:18px}.queue-actions{display:flex;gap:8px}
.queue-list{display:flex;flex-direction:column;gap:8px}
.queue-item{display:grid;grid-template-columns:1fr auto auto;align-items:center;gap:12px;padding:12px 16px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);cursor:pointer;transition:border-color 0.15s}
.queue-item:hover{border-color:var(--text-secondary)}.queue-item.selected{border-color:var(--accent);background:var(--surface-2)}.queue-item.processing{border-color:var(--accent)}.queue-item.completed{border-color:var(--success)}.queue-item.failed{border-color:var(--error)}
.queue-item__info{min-width:0}.queue-item__name{font-weight:600;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.queue-item__meta{font-size:12px;color:var(--text-secondary);margin-top:2px}.queue-item__target{font-size:12px;color:var(--accent);margin-top:2px}
.queue-item__progress{grid-column:1/-1;height:4px;background:var(--border);border-radius:2px;overflow:hidden;margin-top:4px}
.queue-item__progress-bar{height:100%;background:var(--accent);transition:width 0.3s;width:0%}
.queue-item__progress-bar.completed{background:var(--success)}.queue-item__progress-bar.failed{background:var(--error)}
.queue-item__actions{display:flex;gap:6px;align-items:center}.queue-item__status{font-size:12px;padding:2px 8px;border-radius:12px;white-space:nowrap}
.status-pending{color:var(--text-secondary);background:var(--surface-2)}.status-processing{color:var(--accent);background:rgba(59,130,246,0.15)}.status-completed{color:var(--success);background:rgba(34,197,94,0.15)}.status-failed{color:var(--error);background:rgba(239,68,68,0.15)}
.main-content{display:grid;grid-template-columns:340px 1fr;gap:24px;align-items:start}
@media(max-width:1100px){.main-content{grid-template-columns:1fr}}
.param-panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px;position:sticky;top:24px}
.param-panel h3{font-size:16px;margin-bottom:16px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.param-group{margin-bottom:20px}.param-group__label{display:block;font-size:13px;font-weight:600;color:var(--text-secondary);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px}
.resolution-presets{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:8px}
.resolution-preset{padding:6px 8px;background:var(--surface-2);border:1px solid var(--border);border-radius:var(--radius);font-size:12px;color:var(--text);cursor:pointer;text-align:center;transition:all 0.15s}
.resolution-preset:hover{border-color:var(--accent)}.resolution-preset.active{border-color:var(--accent);background:rgba(59,130,246,0.15);color:var(--accent)}
.custom-resolution{display:flex;gap:8px;align-items:center}.custom-resolution input{width:80px;padding:6px 8px;background:var(--surface-2);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-size:13px;text-align:center}.custom-resolution input:focus{outline:none;border-color:var(--accent)}.custom-resolution span{font-size:14px;color:var(--text-secondary)}
.param-select{width:100%;padding:8px 12px;background:var(--surface-2);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-size:14px;cursor:pointer}.param-select:focus{outline:none;border-color:var(--accent)}
.bitrate-group{display:flex;align-items:center;gap:10px}.bitrate-group input[type="range"]{flex:1;accent-color:var(--accent)}.bitrate-group input[type="number"]{width:90px;padding:6px 8px;background:var(--surface-2);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-size:13px;text-align:center}.bitrate-group input[type="number"]:focus{outline:none;border-color:var(--accent)}.bitrate-group__unit{font-size:13px;color:var(--text-secondary)}
.bitrate-presets{display:flex;gap:6px;margin-top:6px}.bitrate-preset{padding:4px 8px;font-size:11px;background:var(--surface-2);border:1px solid var(--border);border-radius:var(--radius);color:var(--text-secondary);cursor:pointer}.bitrate-preset:hover{border-color:var(--accent);color:var(--text)}
.radio-group{display:flex;gap:16px}.radio-group label{display:flex;align-items:center;gap:6px;font-size:14px;cursor:pointer}.radio-group input[type="radio"]{accent-color:var(--accent)}
.estimate-display{padding:12px;background:var(--surface-2);border-radius:var(--radius);text-align:center;margin-top:12px}
.estimate-display__value{font-size:28px;font-weight:700;color:var(--accent)}.estimate-display__range{font-size:12px;color:var(--text-secondary);margin-top:2px}.estimate-display__percent{font-size:13px;color:var(--success);margin-top:4px}
.apply-all-btn{width:100%;margin-top:8px}
.preview-area{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);min-height:400px;display:flex;align-items:center;justify-content:center;overflow:hidden}
.preview-area__empty{text-align:center;color:var(--text-secondary)}.preview-area__empty span{font-size:48px;display:block;margin-bottom:12px}
.preview-area video{max-width:100%;max-height:500px;border-radius:var(--radius)}.preview-area__info{padding:12px 16px;font-size:13px;color:var(--text-secondary);display:flex;gap:16px;flex-wrap:wrap;justify-content:center}.preview-area__info span{white-space:nowrap}
.compare-container{display:grid;grid-template-columns:1fr 1fr;gap:16px}.compare-side{text-align:center}.compare-side h4{margin-bottom:8px;font-size:14px}.compare-side video{width:100%;max-height:400px;border-radius:var(--radius);background:#000}
.compare-stats{grid-column:1/-1;display:flex;gap:24px;justify-content:center;padding:16px;background:var(--surface-2);border-radius:var(--radius)}
.compare-stat{text-align:center}.compare-stat__value{font-size:24px;font-weight:700}.compare-stat__value.saved{color:var(--success)}.compare-stat__label{font-size:12px;color:var(--text-secondary)}
.slider-compare{position:relative;width:100%;max-height:400px;overflow:hidden}.slider-compare video{width:100%;display:block}
.slider-compare__top{position:absolute;top:0;left:0;clip-path:inset(0 50% 0 0)}.slider-compare__handle{position:absolute;top:0;bottom:0;width:3px;background:#fff;cursor:ew-resize;left:50%}
.modal{position:fixed;inset:0;z-index:100;display:flex;align-items:center;justify-content:center}.modal__backdrop{position:absolute;inset:0;background:rgba(0,0,0,0.7)}.modal__content{position:relative;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:24px;max-width:90vw;max-height:90vh;overflow-y:auto;z-index:1}.modal__close{position:absolute;top:12px;right:16px;font-size:24px;background:none;border:none;color:var(--text-secondary);cursor:pointer}.modal__close:hover{color:var(--text)}
.toast-container{position:fixed;bottom:24px;right:24px;z-index:200;display:flex;flex-direction:column;gap:8px}
.toast{padding:12px 20px;border-radius:var(--radius);font-size:14px;font-weight:500;box-shadow:0 2px 8px rgba(0,0,0,0.3);animation:slideIn 0.3s ease;min-width:250px}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
.toast--info{background:var(--accent);color:#fff}.toast--error{background:var(--error);color:#fff}.toast--success{background:var(--success);color:#fff}.toast--warning{background:var(--warning);color:#000}
.log-panel{position:fixed;bottom:24px;left:24px;z-index:200;max-width:420px;max-height:180px;overflow-y:auto;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:8px 12px;font-size:11px;font-family:monospace;color:var(--text-secondary);display:none}.log-panel.visible{display:block}.log-panel .log-line{margin:2px 0}.log-panel .log-error{color:var(--error)}
@media(max-width:768px){.app-container{padding:12px}.header{flex-direction:column;align-items:flex-start}.main-content{grid-template-columns:1fr}.param-panel{position:static}.compare-container{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="app-container">
<header class="header"><h1 id="appTitle">🎬 视频压缩</h1><div class="header-right"><span class="server-status" id="serverStatus">连接中...</span><button class="lang-btn" id="langToggle" title="Switch Language">EN</button></div></header>
<div id="dropZone" class="drop-zone"><div class="drop-zone__content"><span class="drop-zone__icon">📁</span><p id="dropTitle">拖拽视频文件到这里</p><p class="drop-zone__hint" id="dropHint">支持 MP4 / WebM / MKV / MOV | FFmpeg GPU 加速</p><button id="fileSelectBtn" class="btn btn--primary" data-i18n="selectFile">选择文件</button><input type="file" id="fileInput" hidden multiple accept=".mp4,.webm,.mkv,.mov,.avi"></div></div>
<section id="queueSection" class="queue-section hidden"><div class="queue-header"><h2><span data-i18n="queue">队列</span> (<span id="queueCount">0</span>)</h2><div class="queue-actions"><button id="startAllBtn" class="btn btn--primary" data-i18n="startAll">全部开始</button><button id="clearQueueBtn" class="btn btn--ghost" data-i18n="clearDone">清空已完成</button></div></div><div id="queueList" class="queue-list"></div></section>
<div id="mainContent" class="main-content hidden"><aside id="paramPanel" class="param-panel"><p class="preview-area__empty"><span>📋</span><span data-i18n="selectFilePrompt">选择一个文件以设置参数</span></p></aside><section id="previewArea" class="preview-area"><div class="preview-area__empty"><span>🎥</span><p data-i18n="selectFilePreview">选择一个文件以预览</p></div></section></div>
<div id="compareModal" class="modal hidden"><div class="modal__backdrop"></div><div class="modal__content"><button class="modal__close" id="closeCompare">&times;</button><div id="compareContent"></div></div></div>
</div>
<div class="log-panel" id="logPanel"></div>

<script>
// ============================================= I18N =============================================
var I18N={zh:{title:'🎬 视频压缩 (FFmpeg)',connecting:'连接中...',serverOnline:'服务器 ✅',serverOffline:'服务器离线 ⚠️',dropTitle:'拖拽视频文件到这里',dropHint:'支持 MP4 / WebM / MKV / MOV | FFmpeg GPU 加速',selectFile:'选择文件',queue:'队列',startAll:'全部开始',clearDone:'清空已完成',selectFilePrompt:'选择一个文件以设置参数',selectFilePreview:'选择一个文件以预览',analyzing:'正在分析...',waiting:'等待中',completed:'✅ 完成',failed:'❌ 失败',start:'开始',cancel:'取消',download:'下载',compare:'对比',retry:'重试',remove:'移除',targetRes:'目标分辨率',originalSize:'原尺寸',custom:'自定义',videoCodec:'视频编码器',bitrateMode:'码率模式',vbr:'VBR（质量优先）',cbr:'CBR（精确控制）',videoBitrate:'视频码率',fps:'帧率',keepOrigFps:'保持原帧率',audioBitrate:'音频比特率',noAudio:'无音频',applyAll:'📋 应用到全部待处理文件',estSize:'预估大小',approx:'约',savePct:'预计节省',space:'空间',origInfo:'原始',target:'目标',original:'原始',compressed:'压缩后',origSize:'原始大小',compSize:'压缩后大小',saved:'节省',increased:'增大',ratio:'压缩比',sliderCompare:'滑块对比 (拖动白色竖线)',notSupportedFormat:'不是支持的视频格式',tooLarge:'超过 4GB',alreadyInQueue:'已在队列中',waitAnalysis:'请等待文件分析完成',compressDone:'压缩完成',compressFailed:'压缩失败',noPending:'没有待处理的文件',processing:'已有文件正在处理中',appliedAll:'参数已应用到全部待处理文件',serverError:'服务器连接失败。请确认已运行: node server.js',uploadError:'上传失败',ready:'就绪'},en:{title:'🎬 Video Compressor (FFmpeg)',connecting:'Connecting...',serverOnline:'Server ✅',serverOffline:'Server Offline ⚠️',dropTitle:'Drop video files here',dropHint:'Supports MP4 / WebM / MKV / MOV | FFmpeg GPU Accelerated',selectFile:'Select Files',queue:'Queue',startAll:'Start All',clearDone:'Clear Done',selectFilePrompt:'Select a file to configure',selectFilePreview:'Select a file to preview',analyzing:'Analyzing...',waiting:'Waiting',completed:'✅ Done',failed:'❌ Failed',start:'Start',cancel:'Cancel',download:'Download',compare:'Compare',retry:'Retry',remove:'Remove',targetRes:'Target Resolution',originalSize:'Original',custom:'Custom',videoCodec:'Video Codec',bitrateMode:'Bitrate Mode',vbr:'VBR (Quality)',cbr:'CBR (Precise)',videoBitrate:'Video Bitrate',fps:'Frame Rate',keepOrigFps:'Keep Original',audioBitrate:'Audio Bitrate',noAudio:'No Audio',applyAll:'📋 Apply to All Pending',estSize:'Estimated Size',approx:'approx.',savePct:'Est. Savings',space:'space',origInfo:'Original',target:'Target',original:'Original',compressed:'Compressed',origSize:'Original Size',compSize:'Compressed Size',saved:'Saved',increased:'Increase',ratio:'Ratio',sliderCompare:'Slider Compare (drag white line)',notSupportedFormat:'is not supported',tooLarge:'exceeds 4GB',alreadyInQueue:'is already in the queue',waitAnalysis:'Please wait for analysis',compressDone:'Compression complete',compressFailed:'Compression failed',noPending:'No pending files',processing:'Already processing',appliedAll:'Settings applied to all pending files',serverError:'Server connection failed. Please run: node server.js',uploadError:'Upload failed',ready:'Ready'}};
var LANG=localStorage.getItem('vcompress-lang')||'zh';function t(key){return(I18N[LANG]||I18N.zh)[key]||I18N.zh[key]||key;}function setLang(l){LANG=l;localStorage.setItem('vcompress-lang',l);refreshI18n();}function refreshI18n(){document.getElementById('langToggle').textContent=LANG==='zh'?'EN':'中文';document.getElementById('appTitle').textContent=t('title');document.querySelectorAll('[data-i18n]').forEach(function(el){el.textContent=t(el.dataset.i18n);});document.getElementById('dropTitle').textContent=t('dropTitle');document.getElementById('dropHint').textContent=t('dropHint');renderQueue();var tk=getSelectedTask();if(tk){renderParamPanel(tk);renderPreview(tk);}}

var API='';var availableEncoders=[{value:'libopenh264',label:'libopenh264 (H.264)'},{value:'h264_nvenc',label:'h264_nvenc (NVIDIA)'}];var appState={queue:[],selectedId:null,processingCount:0};var MAX_FILE_SIZE=4*1024*1024*1024;var SUPPORTED_EXTENSIONS=['.mp4','.webm','.mkv','.mov','.avi'];
var toastContainer=document.createElement('div');toastContainer.className='toast-container';document.body.appendChild(toastContainer);
function generateId(){return Date.now().toString(36)+Math.random().toString(36).slice(2,8);}
function formatSize(b){if(!b&&b!==0)return'--';if(b>=1e9)return(b/1e9).toFixed(2)+' GB';if(b>=1e6)return(b/1e6).toFixed(1)+' MB';if(b>=1e3)return(b/1e3).toFixed(0)+' KB';return b+' B';}
function formatDuration(sec){if(!sec)return'--';var m=Math.floor(sec/60),s=Math.floor(sec%60);return m+'m'+(''+s).padStart(2,'0')+'s';}
function formatBitrate(b){if(!b&&b!==0)return'--';if(b>=1e6)return(b/1e6).toFixed(1)+' Mbps';if(b>=1e3)return(b/1e3).toFixed(0)+' Kbps';return b+' bps';}
function escapeHtml(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML;}
function showToast(msg,type,dur){type=type||'info';dur=dur||3000;var t=document.createElement('div');t.className='toast toast--'+type;t.textContent=msg;toastContainer.appendChild(t);setTimeout(function(){t.style.opacity='0';t.style.transition='opacity 0.3s';setTimeout(function(){t.remove();},300);},dur);}
function log(msg,isErr){console.log('[VC]',msg);var p=document.getElementById('logPanel');p.classList.add('visible');var l=document.createElement('div');l.className='log-line'+(isErr?' log-error':'');l.textContent=new Date().toLocaleTimeString()+' '+msg;p.appendChild(l);if(p.children.length>50)p.firstChild.remove();}
async function api(method,path,body){try{var opts={method:method,headers:{}};if(body&&!(body instanceof FormData)){opts.headers['Content-Type']='application/json';opts.body=JSON.stringify(body);}else if(body instanceof FormData){opts.body=body;}var r=await fetch(API+path,opts);if(!r.ok){var e=await r.json().catch(function(){return{error:r.statusText};});throw new Error(e.error||r.statusText);}return r.json();}catch(e){if(e.message.indexOf('Failed to fetch')!==-1)throw new Error(t('serverError'));throw e;}}
function getUploadUrl(id){return API+'/api/download/'+id;}
function getPreviewUrl(task){return task._previewUrl||(task._previewUrl=URL.createObjectURL(task.file));}
function estimateSize(o,dur){if(!o||!dur)return 0;return Math.round(((o.videoBitrate||0)+(o.audioBitrate||0))*dur/8*1.02);}

async function extractMediaInfo(task){
  try{
    if(!task._serverId){var fd=new FormData();fd.append('file',task.file);var up=await api('POST','/api/upload',fd);task._serverId=up.id;log('已上传: '+up.id);}
    var info=await api('GET','/api/info/'+task._serverId);
    task.originalInfo={width:info.width,height:info.height,duration:info.duration,fps:info.fps,codec:info.codec,codecLabel:info.codecLabel,videoBitrate:info.videoBitrate,audioBitrate:info.audioBitrate,hasAudio:info.hasAudio};
    task.options=getDefaultOptions(task.originalInfo);
    log(task.file.name+': '+info.width+'x'+info.height+', '+info.fps+'fps, '+info.codecLabel+', '+formatDuration(info.duration));
    renderQueue();if(task.id===appState.selectedId)updateMainContent();
  }catch(err){console.error(err);log('ERROR: '+task.file.name+' - '+err.message,true);task.originalInfo={width:0,height:0,duration:0,fps:0,codec:'',codecLabel:'?',videoBitrate:0,audioBitrate:0,hasAudio:false,error:err.message};task.options=getDefaultOptions(task.originalInfo);renderQueue();}
}
function getDefaultOptions(info){var px=(info.width||1920)*(info.height||1080);var br;if(px>=3840*2160)br=35e6;else if(px>=2560*1440)br=16e6;else if(px>=1920*1080)br=8e6;else if(px>=1280*720)br=5e6;else br=2.5e6;var defEnc=availableEncoders.find(function(e){return e.value==='h264_nvenc';})||availableEncoders.find(function(e){return e.value==='libopenh264';})||availableEncoders[0]||{value:'libopenh264',label:'libopenh264'};return{width:info.width||1920,height:info.height||1080,codec:defEnc.value,codecLabel:defEnc.label||defEnc.value,videoBitrate:Math.min(info.videoBitrate||br,br),bitrateMode:'vbr',fps:info.fps||30,audioBitrate:128000,keepOriginalFps:true};}

function isValidVideoFile(f){var ext='.'+f.name.split('.').pop().toLowerCase();return SUPPORTED_EXTENSIONS.indexOf(ext)!==-1||f.type.indexOf('video/')===0;}
function addFiles(files){var nt=[];for(var i=0;i<files.length;i++){var f=files[i];if(!isValidVideoFile(f)){showToast('"'+f.name+'" '+t('notSupportedFormat'),'warning');continue;}if(f.size>MAX_FILE_SIZE){showToast('"'+f.name+'" '+t('tooLarge'),'error');continue;}if(appState.queue.some(function(x){return x.file.name===f.name&&x.file.size===f.size;})){showToast('"'+f.name+'" '+t('alreadyInQueue'),'info');continue;}nt.push({id:generateId(),file:f,_serverId:null,status:'pending',originalInfo:null,options:null,result:null,error:null,progress:0,_previewUrl:null,_sseSource:null});}appState.queue=appState.queue.concat(nt);if(!appState.selectedId&&appState.queue.length>0)appState.selectedId=appState.queue[0].id;renderQueue();updateMainContent();nt.forEach(function(x){extractMediaInfo(x);});}
function removeTask(id){var i=appState.queue.findIndex(function(x){return x.id===id;});if(i===-1)return;var t=appState.queue[i];if(t._sseSource){t._sseSource.close();t._sseSource=null;}if(t._serverId)api('DELETE','/api/file/'+t._serverId).catch(function(){});if(t._previewUrl)URL.revokeObjectURL(t._previewUrl);appState.queue.splice(i,1);if(appState.selectedId===id)appState.selectedId=appState.queue[0]?appState.queue[0].id:null;renderQueue();updateMainContent();}
function selectTask(id){appState.selectedId=id;renderQueue();updateMainContent();}
function getSelectedTask(){return appState.queue.find(function(x){return x.id===appState.selectedId;})||null;}
function updateTaskOptions(id,opts,skip){var t=appState.queue.find(function(x){return x.id===id;});if(!t||!t.options)return;Object.assign(t.options,opts);if(!skip){renderQueue();if(id===appState.selectedId)renderParamPanel(t);}}

function renderQueue(){var sec=document.getElementById('queueSection'),list=document.getElementById('queueList'),cnt=document.getElementById('queueCount');if(appState.queue.length===0){sec.classList.add('hidden');return;}sec.classList.remove('hidden');cnt.textContent=appState.queue.length;list.innerHTML=appState.queue.map(function(tk){var sel=tk.id===appState.selectedId,info=tk.originalInfo;var st='';if(tk.status==='completed')st='<span class="queue-item__status status-completed">'+t('completed')+'</span>';else if(tk.status==='processing')st='<span class="queue-item__status status-processing">'+tk.progress+'%</span>';else if(tk.status==='failed')st='<span class="queue-item__status status-failed">'+t('failed')+'</span>';else st='<span class="queue-item__status status-pending">'+t('waiting')+'</span>';var act='';if(tk.status==='pending')act='<button class="btn btn--primary btn--small start-btn" data-id="'+tk.id+'">'+t('start')+'</button>';else if(tk.status==='processing')act='<button class="btn btn--danger btn--small cancel-btn" data-id="'+tk.id+'">'+t('cancel')+'</button>';else if(tk.status==='completed')act='<button class="btn btn--primary btn--small download-btn" data-id="'+tk.id+'">'+t('download')+'</button><button class="btn btn--ghost btn--small compare-btn" data-id="'+tk.id+'">'+t('compare')+'</button>';else if(tk.status==='failed')act='<button class="btn btn--ghost btn--small retry-btn" data-id="'+tk.id+'">'+t('retry')+'</button>';act+='<button class="btn btn--icon remove-btn" data-id="'+tk.id+'" title="'+t('remove')+'">✕</button>';var iH=info?info.width+'×'+info.height+' | '+info.fps+'fps | '+info.codecLabel+' | '+formatDuration(info.duration):t('analyzing');var tH=tk.options?t('target')+': '+tk.options.width+'×'+tk.options.height+' | '+formatBitrate(tk.options.videoBitrate)+' | '+tk.options.fps+'fps':'';var eH=(tk.options&&tk.originalInfo)?t('estSize')+': '+formatSize(estimateSize(tk.options,tk.originalInfo.duration)):'';var pB='';if(tk.status==='processing'||tk.status==='completed'||tk.status==='failed')pB='<div class="queue-item__progress"><div class="queue-item__progress-bar '+tk.status+'" style="width:'+tk.progress+'%"></div></div>';return'<div class="queue-item '+(sel?'selected ':'')+tk.status+'" data-id="'+tk.id+'"><div class="queue-item__info"><div class="queue-item__name">'+escapeHtml(tk.file.name)+'</div><div class="queue-item__meta">'+formatSize(tk.file.size)+' | '+iH+'</div>'+(tH?'<div class="queue-item__target">'+tH+'</div>':'')+(eH?'<div style="font-size:12px;color:var(--text-secondary)">'+eH+'</div>':'')+'</div><div class="queue-item__actions">'+act+'</div>'+pB+'</div>';}).join('');list.querySelectorAll('.queue-item').forEach(function(el){el.addEventListener('click',function(e){if(e.target.closest('button'))return;selectTask(el.dataset.id);});});list.querySelectorAll('.start-btn').forEach(function(b){b.addEventListener('click',function(e){e.stopPropagation();startCompression(b.dataset.id);});});list.querySelectorAll('.cancel-btn').forEach(function(b){b.addEventListener('click',function(e){e.stopPropagation();cancelCompression(b.dataset.id);});});list.querySelectorAll('.download-btn').forEach(function(b){b.addEventListener('click',function(e){e.stopPropagation();downloadResult(b.dataset.id);});});list.querySelectorAll('.compare-btn').forEach(function(b){b.addEventListener('click',function(e){e.stopPropagation();openCompare(b.dataset.id);});});list.querySelectorAll('.retry-btn').forEach(function(b){b.addEventListener('click',function(e){e.stopPropagation();retryTask(b.dataset.id);});});list.querySelectorAll('.remove-btn').forEach(function(b){b.addEventListener('click',function(e){e.stopPropagation();removeTask(b.dataset.id);});});}

// ... parameter panel, compression, preview etc — identical to before but using API
function renderParamPanel(task){var pnl=document.getElementById('paramPanel');if(!task||!task.originalInfo){pnl.innerHTML='<p class="preview-area__empty"><span>📋</span>'+t('selectFilePrompt')+'</p>';return;}var info=task.originalInfo,opts=task.options;if(!opts)return;var codecs=availableEncoders.length>0?availableEncoders:[{value:'libopenh264',label:'libopenh264 (H.264)'},{value:'h264_nvenc',label:'h264_nvenc (NVIDIA)'},{value:'h264_mf',label:'h264_mf (Windows)'}];var resos=[{label:'4K',w:3840,h:2160},{label:'2K',w:2560,h:1440},{label:'1080p',w:1920,h:1080},{label:'720p',w:1280,h:720},{label:'480p',w:854,h:480},{label:t('originalSize'),w:info.width,h:info.height}];var isCustom=!resos.some(function(p){return p.label!==t('originalSize')&&p.w===opts.width&&p.h===opts.height;})&&!(opts.width===info.width&&opts.height===info.height);var brK=Math.round(opts.videoBitrate/1000),est=estimateSize(opts,info.duration),sPct=info.videoBitrate?Math.round((1-opts.videoBitrate/info.videoBitrate)*100):0;var fpsOpts=[{label:t('keepOrigFps')+' ('+info.fps+' fps)',value:'orig'},{label:'60 fps',value:60},{label:'30 fps',value:30},{label:'24 fps',value:24},{label:'15 fps',value:15}];pnl.innerHTML='<h3>'+escapeHtml(task.file.name)+'</h3><div style="font-size:13px;color:var(--text-secondary);margin-bottom:16px">'+t('origInfo')+': '+info.width+'×'+info.height+' | '+info.codecLabel+' | '+formatSize(task.file.size)+'</div><div class="param-group"><label class="param-group__label">'+t('targetRes')+'</label><div class="resolution-presets">'+resos.map(function(r){var a=(r.label===t('originalSize')&&opts.width===info.width&&opts.height===info.height)||(r.label!==t('originalSize')&&opts.width===r.w&&opts.height===r.h);return'<button class="resolution-preset '+(a?'active':'')+'" data-preset="'+r.label+'" data-w="'+r.w+'" data-h="'+r.h+'">'+r.label+'</button>';}).join('')+'<button class="resolution-preset '+(isCustom?'active':'')+'" data-preset="custom">'+t('custom')+'</button></div><div class="custom-resolution" style="'+(isCustom?'':'display:none')+'"><input type="number" id="customWidth" value="'+opts.width+'" min="64" max="7680" step="2"><span>×</span><input type="number" id="customHeight" value="'+opts.height+'" min="64" max="7680" step="2"></div></div><div class="param-group"><label class="param-group__label">'+t('videoCodec')+'</label><select class="param-select" id="codecSelect">'+codecs.map(function(c){return'<option value="'+c.value+'" '+(opts.codec===c.value?'selected':'')+'>'+c.label+'</option>';}).join('')+'</select></div><div class="param-group"><label class="param-group__label">'+t('bitrateMode')+'</label><div class="radio-group"><label><input type="radio" name="bitrateMode" value="vbr" '+(opts.bitrateMode==='vbr'?'checked':'')+'> '+t('vbr')+'</label><label><input type="radio" name="bitrateMode" value="cbr" '+(opts.bitrateMode==='cbr'?'checked':'')+'> '+t('cbr')+'</label></div></div><div class="param-group"><label class="param-group__label">'+t('videoBitrate')+': <span id="bitrateLabel">'+formatBitrate(opts.videoBitrate)+'</span></label><div class="bitrate-group"><input type="range" id="bitrateRange" min="500" max="50000" value="'+brK+'" step="100"><input type="number" id="bitrateInput" value="'+brK+'" min="500" max="50000" step="100"><span class="bitrate-group__unit">Kbps</span></div><div class="bitrate-presets">'+[2500,5000,8000,12000,20000,35000].map(function(b){return'<button class="bitrate-preset" data-br="'+b+'">'+(b>=1000?(b/1000).toFixed(0)+'M':b+'K')+'</button>';}).join('')+'</div></div><div class="param-group"><label class="param-group__label">'+t('fps')+'</label><select class="param-select" id="fpsSelect">'+fpsOpts.map(function(f){return'<option value="'+f.value+'" '+((f.value==='orig'&&opts.keepOriginalFps)||(f.value===opts.fps&&!opts.keepOriginalFps)?'selected':'')+'>'+f.label+'</option>';}).join('')+'</select></div>'+(info.hasAudio?'<div class="param-group"><label class="param-group__label">'+t('audioBitrate')+'</label><select class="param-select" id="audioBitrateSelect">'+[64,96,128,192,256,320].map(function(b){return'<option value="'+(b*1000)+'" '+(opts.audioBitrate===b*1000?'selected':'')+'>'+b+' Kbps (AAC)</option>';}).join('')+'</select></div>':'<div class="param-group"><span style="color:var(--text-secondary);font-size:13px">'+t('noAudio')+'</span></div>')+'<button class="btn btn--ghost apply-all-btn" id="applyAllBtn">'+t('applyAll')+'</button><div class="estimate-display"><div class="estimate-display__value">'+formatSize(est)+'</div><div class="estimate-display__range">'+t('approx')+' '+formatSize(est*0.95)+' ~ '+formatSize(est*1.05)+'</div>'+(sPct>0?'<div class="estimate-display__percent">'+t('savePct')+' '+sPct+'% '+t('space')+'</div>':'')+'</div>';setupParamListeners(task);}
function setupParamListeners(task){var p=document.getElementById('paramPanel');p.querySelectorAll('.resolution-preset').forEach(function(b){b.addEventListener('click',function(){var pr=b.dataset.preset,cd=p.querySelector('.custom-resolution');p.querySelectorAll('.resolution-preset').forEach(function(x){x.classList.remove('active');});b.classList.add('active');if(pr==='custom'){if(cd)cd.style.display='flex';updateTaskOptions(task.id,{width:+(p.querySelector('#customWidth')?p.querySelector('#customWidth').value:0)||task.options.width,height:+(p.querySelector('#customHeight')?p.querySelector('#customHeight').value:0)||task.options.height});}else{if(cd)cd.style.display='none';updateTaskOptions(task.id,{width:+b.dataset.w,height:+b.dataset.h});}});});['#customWidth','#customHeight'].forEach(function(s){var i=p.querySelector(s);if(i)i.addEventListener('change',function(){updateTaskOptions(task.id,{width:+(p.querySelector('#customWidth')?p.querySelector('#customWidth').value:0)||task.options.width,height:+(p.querySelector('#customHeight')?p.querySelector('#customHeight').value:0)||task.options.height});});});p.querySelector('#codecSelect')&&p.querySelector('#codecSelect').addEventListener('change',function(){updateTaskOptions(task.id,{codec:this.value,codecLabel:this.selectedOptions[0]?this.selectedOptions[0].textContent:this.value});});p.querySelectorAll('input[name="bitrateMode"]').forEach(function(r){r.addEventListener('change',function(){updateTaskOptions(task.id,{bitrateMode:r.value});});});var range=p.querySelector('#bitrateRange'),inp=p.querySelector('#bitrateInput');if(range&&inp){var sync=function(v){range.value=v;inp.value=v;var l=p.querySelector('#bitrateLabel');if(l)l.textContent=formatBitrate(v*1000);updateTaskOptions(task.id,{videoBitrate:v*1000});};range.addEventListener('input',function(){sync(range.value);});inp.addEventListener('change',function(){var v=+inp.value;v=Math.max(500,Math.min(50000,v||5000));sync(v);});}p.querySelectorAll('.bitrate-preset').forEach(function(b){b.addEventListener('click',function(){var br=+b.dataset.br;if(range){range.value=br;inp.value=br;var l=p.querySelector('#bitrateLabel');if(l)l.textContent=formatBitrate(br*1000);}updateTaskOptions(task.id,{videoBitrate:br*1000});});});p.querySelector('#fpsSelect')&&p.querySelector('#fpsSelect').addEventListener('change',function(){if(this.value==='orig')updateTaskOptions(task.id,{fps:task.originalInfo.fps,keepOriginalFps:true});else updateTaskOptions(task.id,{fps:+this.value,keepOriginalFps:false});});p.querySelector('#audioBitrateSelect')&&p.querySelector('#audioBitrateSelect').addEventListener('change',function(){updateTaskOptions(task.id,{audioBitrate:+this.value});});p.querySelector('#applyAllBtn')&&p.querySelector('#applyAllBtn').addEventListener('click',function(){var o=JSON.parse(JSON.stringify(task.options));appState.queue.forEach(function(t){if(t.id!==task.id&&t.status==='pending')updateTaskOptions(t.id,o,true);});showToast(t('appliedAll'),'success');});}

async function startCompression(id){var task=appState.queue.find(function(t){return t.id===id;});if(!task||task.status==='processing')return;if(!task.options||!task.originalInfo||!task.originalInfo.codec){showToast(t('waitAnalysis'),'warning');return;}if(!task._serverId){showToast('请等待文件上传完成','warning');return;}task.status='processing';task.progress=0;task.error=null;appState.processingCount++;renderQueue();if(task.id===appState.selectedId)renderParamPanel(task);try{await api('POST','/api/compress/'+task._serverId,task.options);log('压缩中: '+task.file.name);var es=new EventSource(API+'/api/progress/'+task._serverId);task._sseSource=es;es.onmessage=function(e){var d=JSON.parse(e.data);if(d.type==='progress'){task.progress=d.progress;renderQueue();}else if(d.type==='completed'){task.status='completed';task.progress=100;task.result={url:getUploadUrl(task._serverId),size:d.size||0};es.close();task._sseSource=null;appState.processingCount--;log('完成: '+task.file.name+' → '+formatSize(task.result.size));showToast('"'+task.file.name+'" '+t('compressDone'),'success');renderQueue();if(task.id===appState.selectedId)renderParamPanel(task);processNextPending();}else if(d.type==='error'){task.status='failed';task.error=d.message||'FFmpeg error';es.close();task._sseSource=null;appState.processingCount--;log('失败: '+task.file.name+' - '+task.error,true);showToast('"'+task.file.name+'" '+t('compressFailed')+': '+task.error,'error');renderQueue();if(task.id===appState.selectedId)renderParamPanel(task);processNextPending();}};es.onerror=function(){es.close();task._sseSource=null;if(task.status==='processing'){task.status='failed';task.error='SSE 连接断开';appState.processingCount--;renderQueue();processNextPending();}};}catch(err){task.status='failed';task.error=err.message;appState.processingCount--;log('失败: '+task.file.name+' - '+task.error,true);showToast('"'+task.file.name+'" '+t('compressFailed')+': '+task.error,'error');renderQueue();if(task.id===appState.selectedId)renderParamPanel(task);processNextPending();}}

function cancelCompression(id){var t=appState.queue.find(function(x){return x.id===id;});if(t&&t._sseSource){t._sseSource.close();t._sseSource=null;}if(t&&t._serverId)api('DELETE','/api/file/'+t._serverId).catch(function(){});if(t){t.status='pending';t.progress=0;appState.processingCount--;renderQueue();}}
function startAllCompression(){var p=appState.queue.filter(function(t){return t.status==='pending';});if(p.length===0){showToast(t('noPending'),'info');return;}if(appState.processingCount===0)startCompression(p[0].id);else showToast(t('processing'),'info');}
function processNextPending(){if(appState.processingCount>0)return;var n=appState.queue.find(function(t){return t.status==='pending'&&t.options;});if(n)startCompression(n.id);}
function retryTask(id){var t=appState.queue.find(function(x){return x.id===id;});if(!t||t.status!=='failed')return;t.status='pending';t.error=null;t.progress=0;renderQueue();if(t.id===appState.selectedId)renderParamPanel(t);startCompression(id);}
function downloadResult(id){var t=appState.queue.find(function(x){return x.id===id;});if(!t||!t.result||!t.result.url)return;var a=document.createElement('a');a.href=t.result.url;a.download=t.file.name.replace(/\.[^.]+$/,'')+'_compressed.mp4';document.body.appendChild(a);a.click();document.body.removeChild(a);}

function updateMainContent(){var mc=document.getElementById('mainContent'),tk=getSelectedTask();if(tk){mc.classList.remove('hidden');renderParamPanel(tk);renderPreview(tk);}else mc.classList.add('hidden');}
function renderPreview(task){var area=document.getElementById('previewArea');if(!task){area.innerHTML='<div class="preview-area__empty"><span>🎥</span><p>'+t('selectFilePreview')+'</p></div>';return;}var info=task.originalInfo,url=getPreviewUrl(task);area.innerHTML='<div style="width:100%;padding:16px;"><video src="'+url+'" controls style="width:100%;max-height:400px;background:#000;border-radius:var(--radius);"></video>'+(info?'<div class="preview-area__info"><span>📐 '+(info.width||'?')+'×'+(info.height||'?')+'</span><span>🎞️ '+(info.fps||'?')+' fps</span><span>📦 '+(info.codecLabel||'?')+'</span><span>⏱️ '+formatDuration(info.duration)+'</span><span>💾 '+formatSize(task.file.size)+'</span></div>':'')+'</div>';}
function openCompare(id){var task=appState.queue.find(function(t){return t.id===id;});if(!task||!task.result||!task.result.url)return;var modal=document.getElementById('compareModal'),content=document.getElementById('compareContent');var ou=getPreviewUrl(task),cu=task.result.url,os=task.file.size,cs=task.result.size||0,sp=cs?Math.round(((os-cs)/os)*100):0,rat=cs?(os/cs).toFixed(1):'--';content.innerHTML='<h3 style="margin-bottom:16px;">'+t('compare')+': '+escapeHtml(task.file.name)+'</h3><div class="compare-container"><div class="compare-side"><h4>📁 '+t('original')+'</h4><video src="'+ou+'" controls></video></div><div class="compare-side"><h4>✅ '+t('compressed')+'</h4><video src="'+cu+'" controls></video></div><div class="compare-stats"><div class="compare-stat"><div class="compare-stat__value">'+formatSize(os)+'</div><div class="compare-stat__label">'+t('origSize')+'</div></div><div class="compare-stat"><div class="compare-stat__value" style="color:var(--accent)">'+formatSize(cs)+'</div><div class="compare-stat__label">'+t('compSize')+'</div></div><div class="compare-stat"><div class="compare-stat__value saved">'+(sp>0?'↓':'↑')+' '+Math.abs(sp)+'%</div><div class="compare-stat__label">'+(sp>0?t('saved'):t('increased'))+'</div></div><div class="compare-stat"><div class="compare-stat__value" style="color:var(--accent)">'+rat+'x</div><div class="compare-stat__label">'+t('ratio')+'</div></div></div></div><h4 style="margin:16px 0 8px;">'+t('sliderCompare')+'</h4><div class="slider-compare" id="sliderCompare"><video src="'+ou+'" controls style="width:100%;"></video><div class="slider-compare__top"><video src="'+cu+'" style="width:100%;" muted></video></div><div class="slider-compare__handle" id="sliderHandle"></div></div>';modal.classList.remove('hidden');setTimeout(function(){var s=document.getElementById('sliderCompare'),h=document.getElementById('sliderHandle');if(!s||!h)return;var d=false;h.addEventListener('mousedown',function(){d=true;});document.addEventListener('mouseup',function(){d=false;});document.addEventListener('mousemove',function(e){if(!d)return;var r=s.getBoundingClientRect(),x=Math.max(0,Math.min(1,(e.clientX-r.left)/r.width));var t=s.querySelector('.slider-compare__top');if(t)t.style.clipPath='inset(0 '+(1-x)*100+'% 0 0)';h.style.left=x*100+'%';});},100);}
function closeCompare(){var m=document.getElementById('compareModal');m.classList.add('hidden');var vs=m.querySelectorAll('video');for(var i=0;i<vs.length;i++)vs[i].pause();}

function setupDragDrop(){var dz=document.getElementById('dropZone'),fi=document.getElementById('fileInput'),fsb=document.getElementById('fileSelectBtn');fsb.addEventListener('click',function(){fi.click();});fi.addEventListener('change',function(){if(fi.files.length>0){addFiles(Array.from(fi.files));fi.value='';}});dz.addEventListener('dragover',function(e){e.preventDefault();dz.classList.add('active');});dz.addEventListener('dragleave',function(){dz.classList.remove('active');});dz.addEventListener('drop',function(e){e.preventDefault();dz.classList.remove('active');var fs=Array.from(e.dataTransfer.files).filter(function(f){return f.type.indexOf('video/')===0||isValidVideoFile(f);});if(fs.length>0)addFiles(fs);});document.addEventListener('paste',function(e){var fs=Array.from(e.clipboardData.items).filter(function(i){return i.kind==='file';}).map(function(i){return i.getAsFile();}).filter(function(f){return f&&f.type.indexOf('video/')===0;});if(fs.length>0)addFiles(fs);});}

window.addEventListener('beforeunload',function(e){if(appState.queue.some(function(t){return t.status==='processing';})){e.preventDefault();e.returnValue='Files are being processed. Leave?';return e.returnValue;}});
async function checkServer(){try{await fetch(API+'/');document.getElementById('serverStatus').textContent=t('serverOnline');document.getElementById('serverStatus').className='server-status online';}catch(e){document.getElementById('serverStatus').textContent=t('serverOffline');document.getElementById('serverStatus').className='server-status offline';}}
async function init(){await checkServer();try{var enc=await api('GET','/api/encoders');if(enc.encoders&&enc.encoders.length>0)availableEncoders=enc.encoders;log('Encoders: '+availableEncoders.length);}catch(e){log('Encoder detection failed',true);}setInterval(checkServer,10000);setupDragDrop();document.getElementById('langToggle').addEventListener('click',function(){setLang(LANG==='zh'?'en':'zh');});document.getElementById('startAllBtn').addEventListener('click',startAllCompression);document.getElementById('clearQueueBtn').addEventListener('click',function(){appState.queue=appState.queue.filter(function(t){return t.status!=='completed'&&t.status!=='failed';});if(!appState.queue.find(function(t){return t.id===appState.selectedId;}))appState.selectedId=appState.queue[0]?appState.queue[0].id:null;renderQueue();updateMainContent();});document.getElementById('closeCompare').addEventListener('click',closeCompare);var mb=document.querySelector('.modal__backdrop');if(mb)mb.addEventListener('click',closeCompare);refreshI18n();log(t('ready'));}document.addEventListener('DOMContentLoaded',init);
</script>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>视频压缩 - 本地 GPU 加速</title>
<style>
/* === CSS Variables === */
:root {
  --bg: #0f0f0f;
  --surface: #1a1a1a;
  --surface-2: #242424;
  --border: #333;
  --text: #e0e0e0;
  --text-secondary: #999;
  --accent: #3b82f6;
  --accent-hover: #2563eb;
  --success: #22c55e;
  --warning: #f59e0b;
  --error: #ef4444;
  --radius: 8px;
  --radius-lg: 12px;
  --shadow: 0 2px 8px rgba(0,0,0,0.3);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg); color: var(--text); line-height: 1.6; min-height: 100vh;
}
.app-container { max-width: 1400px; margin: 0 auto; padding: 24px; }
.header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; padding-bottom: 16px; border-bottom: 1px solid var(--border); }
.header h1 { font-size: 24px; font-weight: 700; }
.browser-status { font-size: 13px; padding: 4px 12px; border-radius: 20px; background: var(--surface-2); }
.browser-status.supported { color: var(--success); }
.browser-status.unsupported { color: var(--error); }
.compat-banner { padding: 12px 16px; margin-bottom: 16px; border-radius: var(--radius); font-size: 14px; font-weight: 500; }
.compat-banner.error { background: #3b1111; color: #fca5a5; border: 1px solid #7f1d1d; }
.compat-banner.warning { background: #2d1f00; color: #fcd34d; border: 1px solid #78350f; }
.hidden { display: none !important; }
.btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; border: none; border-radius: var(--radius); font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.15s; }
.btn--primary { background: var(--accent); color: #fff; }
.btn--primary:hover { background: var(--accent-hover); }
.btn--primary:disabled { background: var(--border); color: var(--text-secondary); cursor: not-allowed; }
.btn--ghost { background: transparent; color: var(--text); border: 1px solid var(--border); }
.btn--ghost:hover { background: var(--surface-2); }
.btn--danger { background: transparent; color: var(--error); border: 1px solid var(--error); }
.btn--danger:hover { background: #3b1111; }
.btn--small { padding: 4px 10px; font-size: 12px; }
.btn--icon { padding: 6px; background: transparent; border: none; color: var(--text-secondary); cursor: pointer; border-radius: var(--radius); }
.btn--icon:hover { color: var(--text); background: var(--surface-2); }

/* Drop Zone */
.drop-zone { border: 2px dashed var(--border); border-radius: var(--radius-lg); padding: 48px; text-align: center; transition: all 0.2s; margin-bottom: 24px; }
.drop-zone.active { border-color: var(--accent); background: rgba(59,130,246,0.08); }
.drop-zone__icon { font-size: 48px; display: block; margin-bottom: 12px; }
.drop-zone p { margin-bottom: 8px; }
.drop-zone__hint { font-size: 13px; color: var(--text-secondary); margin-bottom: 16px; }

/* Queue */
.queue-section { margin-bottom: 24px; }
.queue-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.queue-header h2 { font-size: 18px; }
.queue-actions { display: flex; gap: 8px; }
.queue-list { display: flex; flex-direction: column; gap: 8px; }
.queue-item { display: grid; grid-template-columns: 1fr auto auto; align-items: center; gap: 12px; padding: 12px 16px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); cursor: pointer; transition: border-color 0.15s; }
.queue-item:hover { border-color: var(--text-secondary); }
.queue-item.selected { border-color: var(--accent); background: var(--surface-2); }
.queue-item.processing { border-color: var(--accent); }
.queue-item.completed { border-color: var(--success); }
.queue-item.failed { border-color: var(--error); }
.queue-item__info { min-width: 0; }
.queue-item__name { font-weight: 600; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.queue-item__meta { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }
.queue-item__target { font-size: 12px; color: var(--accent); margin-top: 2px; }
.queue-item__progress { grid-column: 1 / -1; height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; margin-top: 4px; }
.queue-item__progress-bar { height: 100%; background: var(--accent); transition: width 0.3s; width: 0%; }
.queue-item__progress-bar.completed { background: var(--success); }
.queue-item__progress-bar.failed { background: var(--error); }
.queue-item__actions { display: flex; gap: 6px; align-items: center; }
.queue-item__status { font-size: 12px; padding: 2px 8px; border-radius: 12px; white-space: nowrap; }
.status-pending { color: var(--text-secondary); background: var(--surface-2); }
.status-processing { color: var(--accent); background: rgba(59,130,246,0.15); }
.status-completed { color: var(--success); background: rgba(34,197,94,0.15); }
.status-failed { color: var(--error); background: rgba(239,68,68,0.15); }

/* Main Layout */
.main-content { display: grid; grid-template-columns: 340px 1fr; gap: 24px; align-items: start; }
@media (max-width: 1100px) { .main-content { grid-template-columns: 1fr; } }

/* Parameter Panel */
.param-panel { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 20px; position: sticky; top: 24px; }
.param-panel h3 { font-size: 16px; margin-bottom: 16px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
.param-group { margin-bottom: 20px; }
.param-group__label { display: block; font-size: 13px; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
.resolution-presets { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-bottom: 8px; }
.resolution-preset { padding: 6px 8px; background: var(--surface-2); border: 1px solid var(--border); border-radius: var(--radius); font-size: 12px; color: var(--text); cursor: pointer; text-align: center; transition: all 0.15s; }
.resolution-preset:hover { border-color: var(--accent); }
.resolution-preset.active { border-color: var(--accent); background: rgba(59,130,246,0.15); color: var(--accent); }
.custom-resolution { display: flex; gap: 8px; align-items: center; }
.custom-resolution input { width: 80px; padding: 6px 8px; background: var(--surface-2); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); font-size: 13px; text-align: center; }
.custom-resolution input:focus { outline: none; border-color: var(--accent); }
.custom-resolution span { font-size: 14px; color: var(--text-secondary); }
.param-select { width: 100%; padding: 8px 12px; background: var(--surface-2); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); font-size: 14px; cursor: pointer; }
.param-select:focus { outline: none; border-color: var(--accent); }
.param-select:disabled { opacity: 0.5; cursor: not-allowed; }
.bitrate-group { display: flex; align-items: center; gap: 10px; }
.bitrate-group input[type="range"] { flex: 1; accent-color: var(--accent); }
.bitrate-group input[type="number"] { width: 90px; padding: 6px 8px; background: var(--surface-2); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); font-size: 13px; text-align: center; }
.bitrate-group input[type="number"]:focus { outline: none; border-color: var(--accent); }
.bitrate-group__unit { font-size: 13px; color: var(--text-secondary); }
.bitrate-presets { display: flex; gap: 6px; margin-top: 6px; }
.bitrate-preset { padding: 4px 8px; font-size: 11px; background: var(--surface-2); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text-secondary); cursor: pointer; }
.bitrate-preset:hover { border-color: var(--accent); color: var(--text); }
.radio-group { display: flex; gap: 16px; }
.radio-group label { display: flex; align-items: center; gap: 6px; font-size: 14px; cursor: pointer; }
.radio-group input[type="radio"] { accent-color: var(--accent); }

/* Estimate */
.estimate-display { padding: 12px; background: var(--surface-2); border-radius: var(--radius); text-align: center; margin-top: 12px; }
.estimate-display__value { font-size: 28px; font-weight: 700; color: var(--accent); }
.estimate-display__range { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }
.estimate-display__percent { font-size: 13px; color: var(--success); margin-top: 4px; }
.apply-all-btn { width: 100%; margin-top: 8px; }

/* Preview */
.preview-area { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); min-height: 400px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
.preview-area__empty { text-align: center; color: var(--text-secondary); }
.preview-area__empty span { font-size: 48px; display: block; margin-bottom: 12px; }
.preview-area video { max-width: 100%; max-height: 500px; border-radius: var(--radius); }
.preview-area__info { padding: 12px 16px; font-size: 13px; color: var(--text-secondary); display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; }
.preview-area__info span { white-space: nowrap; }

/* Comparison */
.compare-container { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.compare-side { text-align: center; }
.compare-side h4 { margin-bottom: 8px; font-size: 14px; }
.compare-side video { width: 100%; max-height: 400px; border-radius: var(--radius); background: #000; }
.compare-stats { grid-column: 1 / -1; display: flex; gap: 24px; justify-content: center; padding: 16px; background: var(--surface-2); border-radius: var(--radius); }
.compare-stat { text-align: center; }
.compare-stat__value { font-size: 24px; font-weight: 700; }
.compare-stat__value.saved { color: var(--success); }
.compare-stat__label { font-size: 12px; color: var(--text-secondary); }
.slider-compare { position: relative; width: 100%; max-height: 400px; overflow: hidden; }
.slider-compare video { width: 100%; display: block; }
.slider-compare__top { position: absolute; top: 0; left: 0; clip-path: inset(0 50% 0 0); }
.slider-compare__handle { position: absolute; top: 0; bottom: 0; width: 3px; background: #fff; cursor: ew-resize; left: 50%; }

/* Modal */
.modal { position: fixed; inset: 0; z-index: 100; display: flex; align-items: center; justify-content: center; }
.modal__backdrop { position: absolute; inset: 0; background: rgba(0,0,0,0.7); }
.modal__content { position: relative; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 24px; max-width: 90vw; max-height: 90vh; overflow-y: auto; z-index: 1; }
.modal__close { position: absolute; top: 12px; right: 16px; font-size: 24px; background: none; border: none; color: var(--text-secondary); cursor: pointer; }
.modal__close:hover { color: var(--text); }

/* Toast */
.toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 200; display: flex; flex-direction: column; gap: 8px; }
.toast { padding: 12px 20px; border-radius: var(--radius); font-size: 14px; font-weight: 500; box-shadow: var(--shadow); animation: slideIn 0.3s ease; display: flex; align-items: center; gap: 8px; min-width: 250px; }
@keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
.toast--info { background: var(--accent); color: #fff; }
.toast--error { background: var(--error); color: #fff; }
.toast--success { background: var(--success); color: #fff; }
.toast--warning { background: var(--warning); color: #000; }

/* Loading */
.loading-spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.6s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* Log panel */
.log-panel { position: fixed; bottom: 24px; left: 24px; z-index: 200; max-width: 400px; max-height: 200px; overflow-y: auto; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 8px 12px; font-size: 11px; font-family: monospace; color: var(--text-secondary); display: none; }
.log-panel.visible { display: block; }
.log-panel .log-line { margin: 2px 0; }
.log-panel .log-error { color: var(--error); }

@media (max-width: 768px) {
  .app-container { padding: 12px; }
  .header { flex-direction: column; align-items: flex-start; gap: 8px; }
  .main-content { grid-template-columns: 1fr; }
  .param-panel { position: static; }
  .compare-container { grid-template-columns: 1fr; }
}
</style>
</head>
<body>
<div class="app-container">
  <header class="header">
    <h1>🎬 视频压缩</h1>
    <span class="browser-status" id="browserStatus">检测中...</span>
  </header>
  <div id="compatBanner" class="compat-banner hidden"></div>
  <div id="dropZone" class="drop-zone">
    <div class="drop-zone__content">
      <span class="drop-zone__icon">📁</span>
      <p>拖拽视频文件到这里</p>
      <p class="drop-zone__hint">支持 MP4 / WebM / MKV / MOV | Chrome/Edge 推荐 (GPU 加速)</p>
      <button id="fileSelectBtn" class="btn btn--primary">选择文件</button>
      <input type="file" id="fileInput" hidden multiple accept=".mp4,.webm,.mkv,.mov,.avi">
    </div>
  </div>
  <section id="queueSection" class="queue-section hidden">
    <div class="queue-header">
      <h2>队列 (<span id="queueCount">0</span>)</h2>
      <div class="queue-actions">
        <button id="startAllBtn" class="btn btn--primary">全部开始</button>
        <button id="clearQueueBtn" class="btn btn--ghost">清空已完成</button>
      </div>
    </div>
    <div id="queueList" class="queue-list"></div>
  </section>
  <div id="mainContent" class="main-content hidden">
    <aside id="paramPanel" class="param-panel">
      <p class="preview-area__empty"><span>📋</span>选择一个文件以设置参数</p>
    </aside>
    <section id="previewArea" class="preview-area">
      <div class="preview-area__empty"><span>🎥</span><p>选择一个文件以预览</p></div>
    </section>
  </div>
  <div id="compareModal" class="modal hidden">
    <div class="modal__backdrop"></div>
    <div class="modal__content">
      <button class="modal__close" id="closeCompare">&times;</button>
      <div id="compareContent"></div>
    </div>
  </div>
</div>
<div class="log-panel" id="logPanel"></div>

<script src="mp4box.all.js"></script>
<script>
// =============================================
// STATE & UTILITIES
// =============================================

const appState = { queue: [], selectedId: null, processingCount: 0 };
let compatibilityResult = null;
const MAX_FILE_SIZE = 4 * 1024 * 1024 * 1024;
const SUPPORTED_EXTENSIONS = ['.mp4', '.webm', '.mkv', '.mov', '.avi'];

const toastContainer = document.createElement('div');
toastContainer.className = 'toast-container';
document.body.appendChild(toastContainer);

function generateId() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 8); }
function formatSize(bytes) { if (!bytes && bytes !== 0) return '--'; if (bytes >= 1e9) return (bytes / 1e9).toFixed(2) + ' GB'; if (bytes >= 1e6) return (bytes / 1e6).toFixed(1) + ' MB'; if (bytes >= 1e3) return (bytes / 1e3).toFixed(0) + ' KB'; return bytes + ' B'; }
function formatDuration(seconds) { if (!seconds) return '--'; const m = Math.floor(seconds / 60); const s = Math.floor(seconds % 60); return `${m}分${s.toString().padStart(2, '0')}秒`; }
function formatBitrate(bps) { if (!bps && bps !== 0) return '--'; if (bps >= 1_000_000) return (bps / 1_000_000).toFixed(1) + ' Mbps'; if (bps >= 1_000) return (bps / 1_000).toFixed(0) + ' Kbps'; return bps + ' bps'; }
function escapeHtml(str) { const div = document.createElement('div'); div.textContent = str; return div.innerHTML; }
function showToast(msg, type = 'info', dur = 3000) { const t = document.createElement('div'); t.className = `toast toast--${type}`; t.textContent = msg; toastContainer.appendChild(t); setTimeout(() => { t.style.opacity = '0'; t.style.transition = 'opacity 0.3s'; setTimeout(() => t.remove(), 300); }, dur); }

// Debug logging
function log(msg, isError = false) {
  console.log('[VC]', msg);
  const panel = document.getElementById('logPanel');
  panel.classList.add('visible');
  const line = document.createElement('div');
  line.className = 'log-line' + (isError ? ' log-error' : '');
  line.textContent = new Date().toLocaleTimeString() + ' ' + msg;
  panel.appendChild(line);
  if (panel.children.length > 50) panel.firstChild.remove();
}

// =============================================
// ANNEX B -> AVCC CONVERSION
// Chrome VideoEncoder outputs Annex B byte-stream format.
// mp4box.js expects AVCC (length-prefixed NAL units) for MP4.
// =============================================

function annexBToAVCC(buffer) {
  const data = new Uint8Array(buffer);
  const nals = [];
  let start = 0;

  for (let i = 0; i < data.length - 2; i++) {
    // Look for start code: 00 00 01 or 00 00 00 01
    const is3Byte = data[i] === 0 && data[i+1] === 0 && data[i+2] === 1;
    const is4Byte = i + 3 < data.length && data[i] === 0 && data[i+1] === 0 && data[i+2] === 0 && data[i+3] === 1;
    if (is3Byte || is4Byte) {
      if (start < i) nals.push(data.subarray(start, i));
      start = is4Byte ? i + 4 : i + 3;
      i = start - 1;
    }
  }
  if (start < data.length) nals.push(data.subarray(start));

  if (nals.length === 0) return buffer;

  const totalSize = nals.reduce((s, n) => s + 4 + n.length, 0);
  const avcc = new Uint8Array(totalSize);
  let pos = 0;
  for (const nal of nals) {
    avcc[pos] = (nal.length >> 24) & 0xff;
    avcc[pos+1] = (nal.length >> 16) & 0xff;
    avcc[pos+2] = (nal.length >> 8) & 0xff;
    avcc[pos+3] = nal.length & 0xff;
    avcc.set(nal, pos + 4);
    pos += 4 + nal.length;
  }
  return avcc.buffer;
}

// =============================================
// COMPATIBILITY DETECTION
// =============================================

async function checkCompatibility() {
  const result = { supported: false, codecs: [], warnings: [], aacSupported: false };
  if (typeof VideoEncoder === 'undefined' || typeof VideoDecoder === 'undefined') {
    result.warnings.push('当前浏览器不支持 WebCodecs API。请使用 Chrome 94+ 或 Edge 94+。');
    return result;
  }
  result.supported = true;
  const configs = [
    { codec: 'avc1.42001E', label: 'H.264 Baseline' },
    { codec: 'avc1.4D002A', label: 'H.264 Main' },
    { codec: 'avc1.640028', label: 'H.264 High' },
    { codec: 'hvc1.1.6.L120.90', label: 'H.265/HEVC' },
    { codec: 'vp09.00.10.08', label: 'VP9' },
    { codec: 'av01.0.04M.08', label: 'AV1' },
  ];
  for (const cfg of configs) {
    try {
      const s = await VideoEncoder.isConfigSupported({ codec: cfg.codec, width: 1920, height: 1080, bitrate: 5_000_000, framerate: 30 });
      cfg.supported = s.supported === true;
      if (s.supported) {
        const hw = await VideoEncoder.isConfigSupported({ codec: cfg.codec, width: 1920, height: 1080, bitrate: 5_000_000, framerate: 30, hardwareAcceleration: 'prefer-hardware' });
        cfg.hardwareAccelerated = hw.supported === true;
      }
    } catch { cfg.supported = false; cfg.hardwareAccelerated = false; }
    result.codecs.push(cfg);
  }
  if (typeof AudioEncoder !== 'undefined') {
    try { const a = await AudioEncoder.isConfigSupported({ codec: 'mp4a.40.2', sampleRate: 48000, numberOfChannels: 2 }); result.aacSupported = a.supported === true; } catch { result.aacSupported = false; }
  }
  return result;
}

function getAvailableCodecs(r) { return r.codecs.filter(c => c.supported).map(c => ({ value: c.codec, label: c.label + (c.hardwareAccelerated ? ' (GPU)' : ' (CPU)'), hardware: c.hardwareAccelerated })); }
function getCodecLabel(codec) { if (!codec) return '未知'; const c = codec.toLowerCase(); if (c.includes('avc')||c.includes('h264')) return 'H.264'; if (c.includes('hvc')||c.includes('hev')||c.includes('h265')) return 'H.265'; if (c.includes('vp9')||c.includes('vp09')) return 'VP9'; if (c.includes('vp8')||c.includes('vp08')) return 'VP8'; if (c.includes('av1')||c.includes('av01')) return 'AV1'; return codec.substring(0,10); }

function updateBrowserStatus(compat) {
  const el = document.getElementById('browserStatus');
  if (compat.supported) { const n = compat.codecs.filter(c => c.hardwareAccelerated).length; el.textContent = n > 0 ? `Chrome ✅ | ${n} 个 GPU 编码器可用` : 'Chrome ✅ | 软编码'; el.className = 'browser-status supported'; }
  else { el.textContent = '⚠️ 不支持 WebCodecs'; el.className = 'browser-status unsupported'; }
}
function showCompatBanner(compat) {
  const b = document.getElementById('compatBanner');
  if (!compat.supported) { b.className = 'compat-banner error'; b.textContent = compat.warnings[0]; }
  else if (compat.warnings.length > 0) { b.className = 'compat-banner warning'; b.textContent = compat.warnings.join(' '); }
  else { b.className = 'compat-banner hidden'; }
}

// =============================================
// SIZE ESTIMATION
// =============================================

function estimateSize(options, dur) { if (!options||!dur) return 0; return Math.round(((options.videoBitrate||0)+(options.audioBitrate||0))*dur/8*1.02); }

// =============================================
// MEDIA INFO EXTRACTION (FIXED)
// =============================================

async function extractMediaInfo(task) {
  try {
    const info = await parseVideoFile(task.file);
    task.originalInfo = info;
    task.options = getDefaultOptions(info);
    log(`${task.file.name}: ${info.width}x${info.height}, ${info.fps}fps, ${info.codecLabel}, ${formatDuration(info.duration)}`);
    renderQueue();
    if (task.id === appState.selectedId) updateMainContent();
  } catch (err) {
    console.error('Media info error:', err);
    log(`ERROR: ${task.file.name} - ${err.message}`, true);
    task.originalInfo = { width: 0, height: 0, duration: 0, fps: 0, codec: '', codecLabel: '未知', videoBitrate: 0, audioBitrate: 0, hasAudio: false, error: err.message };
    task.options = getDefaultOptions(task.originalInfo);
    renderQueue();
  }
}

function parseVideoFile(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const buffer = e.target.result;
      const mp4boxFile = MP4Box.createFile();
      const info = { width: 0, height: 0, duration: 0, fps: 0, codec: '', codecLabel: '', videoBitrate: 0, audioBitrate: 0, hasAudio: false, videoTrackId: 0, audioTrackId: 0, trackInfo: null, description: null };
      let resolved = false;

      mp4boxFile.onReady = (mp4Info) => {
        info.trackInfo = mp4Info;
        if (!mp4Info.videoTracks || mp4Info.videoTracks.length === 0) {
          if (!resolved) { resolved = true; reject(new Error('文件中未找到视频轨道')); }
          return;
        }
        const vt = mp4Info.videoTracks[0];
        info.width = vt.track_width;
        info.height = vt.track_height;
        info.codec = vt.codec || '';
        info.codecLabel = getCodecLabel(vt.codec || '');
        info.videoTrackId = vt.id;

        // Calculate FPS from track metadata (NOT from samples)
        const trackDur = vt.samples_duration || (mp4Info.duration / (mp4Info.timescale || 1) * (vt.timescale || 1));
        const trackTimescale = vt.timescale || mp4Info.timescale || 1;
        const nbSamples = vt.nb_samples || 0;
        if (nbSamples > 0 && trackDur > 0) {
          info.fps = Math.round(nbSamples / (trackDur / trackTimescale));
        }
        // Duration in seconds
        info.duration = (vt.samples_duration || mp4Info.duration) / (vt.timescale || mp4Info.timescale || 1);

        // Bitrate estimation
        const durationSec = info.duration || 1;
        info.videoBitrate = Math.round((file.size * 0.9 * 8) / durationSec); // ~90% of file is video
        info.audioBitrate = info.hasAudio ? 128000 : 0;

        if (mp4Info.audioTracks && mp4Info.audioTracks.length > 0) {
          info.hasAudio = true;
          info.audioTrackId = mp4Info.audioTracks[0].id;
        }

        // Extract a few samples to get the description (codec config)
        mp4boxFile.setExtractionOptions(info.videoTrackId, null, { nbSamples: 5 });
        mp4boxFile.start(); // CRITICAL: must call start() after setExtractionOptions!
      };

      mp4boxFile.onSamples = (trackId, user, samples) => {
        if (trackId === info.videoTrackId && samples.length > 0) {
          // Get description from first keyframe
          for (const s of samples) {
            if (s.is_sync && s.description) {
              info.description = s.description;
              break;
            }
          }
          if (!info.description) info.description = samples[0].description;
        }
      };

      mp4boxFile.onError = (err) => {
        if (!resolved) { resolved = true; reject(new Error('解析视频文件失败: ' + (err.message || '未知'))); }
      };

      buffer.fileStart = 0;
      mp4boxFile.appendBuffer(buffer);
      mp4boxFile.flush();

      // Wait for onReady + extraction to complete
      setTimeout(() => {
        if (!resolved && info.width > 0) { resolved = true; resolve(info); }
        else if (!resolved) { resolved = true; reject(new Error('视频解析超时')); }
      }, 2000);
    };
    reader.onerror = () => reject(new Error('读取文件失败'));
    reader.readAsArrayBuffer(file);
  });
}

function getDefaultOptions(info) {
  if (!compatibilityResult) {
    return { width: info.width||1920, height: info.height||1080, codec: 'avc1.42001E', codecLabel: 'H.264', videoBitrate: 5_000_000, bitrateMode: 'vbr', fps: info.fps||30, audioBitrate: 128000, keepOriginalFps: true };
  }
  const available = getAvailableCodecs(compatibilityResult);
  const def = available.find(c => c.value.includes('avc1.4D002A')) || available[0] || { value: 'avc1.42001E', label: 'H.264' };
  const px = (info.width||1920)*(info.height||1080);
  let br; if (px>=3840*2160) br=35_000_000; else if (px>=2560*1440) br=16_000_000; else if (px>=1920*1080) br=8_000_000; else if (px>=1280*720) br=5_000_000; else br=2_500_000;
  return { width: info.width||1920, height: info.height||1080, codec: def.value, codecLabel: def.label, videoBitrate: Math.min(info.videoBitrate||br,br), bitrateMode: 'vbr', fps: info.fps||30, audioBitrate: 128000, keepOriginalFps: true };
}

// =============================================
// FILE MANAGEMENT
// =============================================

function isValidVideoFile(file) { const ext='.'+file.name.split('.').pop().toLowerCase(); return SUPPORTED_EXTENSIONS.includes(ext)||file.type.startsWith('video/'); }

function addFiles(files) {
  const nt = [];
  for (const f of files) {
    if (!isValidVideoFile(f)) { showToast(`"${f.name}" 不是支持的视频格式`, 'warning'); continue; }
    if (f.size > MAX_FILE_SIZE) { showToast(`"${f.name}" 超过 4GB`, 'error'); continue; }
    if (appState.queue.some(t => t.file.name===f.name && t.file.size===f.size)) { showToast(`"${f.name}" 已在队列中`, 'info'); continue; }
    nt.push({ id: generateId(), file: f, status: 'pending', originalInfo: null, options: null, result: null, error: null, progress: 0, abortController: null, _previewUrl: null });
  }
  appState.queue.push(...nt);
  if (!appState.selectedId && appState.queue.length>0) appState.selectedId = appState.queue[0].id;
  renderQueue(); updateMainContent();
  nt.forEach(t => extractMediaInfo(t));
}

function removeTask(id) {
  const idx = appState.queue.findIndex(t => t.id===id); if (idx===-1) return;
  const t = appState.queue[idx];
  if (t.status==='processing' && t.abortController) { t.abortController.abort(); appState.processingCount--; }
  if (t.result?.url) URL.revokeObjectURL(t.result.url);
  if (t._previewUrl) URL.revokeObjectURL(t._previewUrl);
  appState.queue.splice(idx,1);
  if (appState.selectedId===id) appState.selectedId = appState.queue[0]?.id||null;
  renderQueue(); updateMainContent();
}

function selectTask(id) { appState.selectedId=id; renderQueue(); updateMainContent(); }
function getSelectedTask() { return appState.queue.find(t => t.id===appState.selectedId)||null; }

function updateTaskOptions(id, newOpts, skipRender=false) {
  const t = appState.queue.find(t => t.id===id); if (!t||!t.options) return;
  Object.assign(t.options, newOpts);
  if (!skipRender) { renderQueue(); if (id===appState.selectedId) renderParamPanel(t); }
}

function renderQueue() {

    const sel=task.id===appState.selectedId, info=task.originalInfo;
    let st=''; if (task.status==='completed') st='<span class="queue-item__status status-completed">✅ 完成</span>'; else if (task.status==='processing') st=`<span class="queue-item__status status-processing">${task.progress}%</span>`; else if (task.status==='failed') st='<span class="queue-item__status status-failed">❌ 失败</span>'; else st='<span class="queue-item__status status-pending">等待中</span>';
    let act=''; if (task.status==='pending') act=`<button class="btn btn--primary btn--small start-btn" data-id="${task.id}">开始</button>`; else if (task.status==='processing') act=`<button class="btn btn--danger btn--small cancel-btn" data-id="${task.id}">取消</button>`; else if (task.status==='completed') act=`<button class="btn btn--primary btn--small download-btn" data-id="${task.id}">下载</button><button class="btn btn--ghost btn--small compare-btn" data-id="${task.id}">对比</button>`; else if (task.status==='failed') act=`<button class="btn btn--ghost btn--small retry-btn" data-id="${task.id}">重试</button>`;
    act+=`<button class="btn btn--icon remove-btn" data-id="${task.id}" title="移除">✕</button>`;
    const infoH=info?`${info.width||'?'}×${info.height||'?'} | ${info.fps||'?'}fps | ${info.codecLabel||'?'} | ${formatDuration(info.duration)}`:'正在分析...';
    const tgtH=task.options?`目标: ${task.options.width}×${task.options.height} | ${formatBitrate(task.options.videoBitrate)} | ${task.options.fps}fps`:'';
    const estH=(task.options&&task.originalInfo)?`预估: ${formatSize(estimateSize(task.options, task.originalInfo.duration))}`:'';
    let prog=''; if (task.status==='processing'||task.status==='completed'||task.status==='failed') prog=`<div class="queue-item__progress"><div class="queue-item__progress-bar ${task.status}" style="width:${task.progress}%"></div></div>`;
    return `<div class="queue-item ${sel?'selected':''} ${task.status}" data-id="${task.id}"><div class="queue-item__info"><div class="queue-item__name">${escapeHtml(task.file.name)}</div><div class="queue-item__meta">${formatSize(task.file.size)} | ${infoH}</div>${tgtH?`<div class="queue-item__target">${tgtH}</div>`:''}${estH?`<div style="font-size:12px;color:var(--text-secondary)">${estH}</div>`:''}</div><div class="queue-item__actions">${act}</div>${prog}</div>`;
  }).join('');
  list.querySelectorAll('.queue-item').forEach(el=>{el.addEventListener('click',e=>{if(e.target.closest('button'))return;selectTask(el.dataset.id);});});
  list.querySelectorAll('.start-btn').forEach(b=>b.addEventListener('click',e=>{e.stopPropagation();startCompression(b.dataset.id);}));
  list.querySelectorAll('.cancel-btn').forEach(b=>b.addEventListener('click',e=>{e.stopPropagation();cancelCompression(b.dataset.id);}));
  list.querySelectorAll('.download-btn').forEach(b=>b.addEventListener('click',e=>{e.stopPropagation();downloadResult(b.dataset.id);}));
  list.querySelectorAll('.compare-btn').forEach(b=>b.addEventListener('click',e=>{e.stopPropagation();openCompare(b.dataset.id);}));
  list.querySelectorAll('.retry-btn').forEach(b=>b.addEventListener('click',e=>{e.stopPropagation();retryTask(b.dataset.id);}));
  list.querySelectorAll('.remove-btn').forEach(b=>b.addEventListener('click',e=>{e.stopPropagation();removeTask(b.dataset.id);}));
}

  const availableCodecs=compatibilityResult?getAvailableCodecs(compatibilityResult):[{value:'avc1.42001E',label:'H.264',hardware:true}];
  const resos=[{label:'4K',w:3840,h:2160},{label:'2K',w:2560,h:1440},{label:'1080p',w:1920,h:1080},{label:'720p',w:1280,h:720},{label:'480p',w:854,h:480},{label:'原尺寸',w:info.width,h:info.height}];

    <div class="param-group"><label class="param-group__label">视频编码器</label><select class="param-select" id="codecSelect">${availableCodecs.map(c=>`<option value="${c.value}" ${opts.codec===c.value?'selected':''} ${!c.hardware?'disabled':''}>${c.label}${!c.hardware?' (不可用)':''}</option>`).join('')}</select></div>

  ['#customWidth','#customHeight'].forEach(s=>{const i=p.querySelector(s);if(i)i.addEventListener('change',()=>{updateTaskOptions(task.id,{width:+p.querySelector('#customWidth')?.value||task.options.width,height:+p.querySelector('#customHeight')?.value||task.options.height});});});
  p.querySelector('#codecSelect')?.addEventListener('change',function(){updateTaskOptions(task.id,{codec:this.value,codecLabel:this.selectedOptions[0]?.textContent||this.value});});
  p.querySelectorAll('input[name="bitrateMode"]').forEach(r=>{r.addEventListener('change',()=>updateTaskOptions(task.id,{bitrateMode:r.value}));});
  const range=p.querySelector('#bitrateRange'),inp=p.querySelector('#bitrateInput');
  if(range&&inp){const sync=v=>{range.value=v;inp.value=v;const l=p.querySelector('#bitrateLabel');if(l)l.textContent=formatBitrate(v*1000);updateTaskOptions(task.id,{videoBitrate:v*1000});};range.addEventListener('input',()=>sync(range.value));inp.addEventListener('change',()=>{let v=+inp.value;v=Math.max(500,Math.min(50000,v||5000));sync(v);});}
  p.querySelectorAll('.bitrate-preset').forEach(b=>{b.addEventListener('click',()=>{const br=+b.dataset.br;if(range){range.value=br;inp.value=br;const l=p.querySelector('#bitrateLabel');if(l)l.textContent=formatBitrate(br*1000);}updateTaskOptions(task.id,{videoBitrate:br*1000});});});
  p.querySelector('#fpsSelect')?.addEventListener('change',function(){if(this.value==='orig')updateTaskOptions(task.id,{fps:task.originalInfo.fps,keepOriginalFps:true});else updateTaskOptions(task.id,{fps:+this.value,keepOriginalFps:false});});
  p.querySelector('#audioBitrateSelect')?.addEventListener('change',function(){updateTaskOptions(task.id,{audioBitrate:+this.value});});
  p.querySelector('#applyAllBtn')?.addEventListener('click',()=>{const o={...task.options};appState.queue.forEach(t=>{if(t.id!==task.id&&t.status==='pending')updateTaskOptions(t.id,o,true);});showToast('参数已应用到全部待处理文件','success');});
}

// =============================================
// COMPRESSION ENGINE (FIXED)
// =============================================

class CompressionEngine {
  constructor(file, options, originalInfo, onProgress, signal) {
    this.file = file; this.options = options; this.originalInfo = originalInfo;
    this.onProgress = onProgress; this.signal = signal;
    this.videoDecoder = null; this.videoEncoder = null; this.audioEncoder = null;
    this.canvas = null; this.ctx = null;
    this.encodedVideoChunks = []; this.encodedAudioChunks = [];
    this.startTime = 0; this.aborted = false;
    this._resolve = null; this._reject = null;
    this._mp4boxFile = null; // Keep reference for cleanup
  }

  async start() { return new Promise((res, rej) => { this._resolve = res; this._reject = rej; this._run().catch(rej); }); }

  async _run() {
    this.startTime = performance.now();
    log('开始压缩: ' + this.file.name + ' → ' + this.options.width + 'x' + this.options.height + ' ' + formatBitrate(this.options.videoBitrate));
    this.reportProgress('demux', 0);
    if (this.signal?.aborted) throw new Error('已取消');

    // 1. Read file
    const buffer = await this._readFile();
    if (this.signal?.aborted) throw new Error('已取消');

    // 2. Demux
    this.reportProgress('demux', 30);
    const { videoSamples, audioSamples, description } = await this._demux(buffer);
    log(`Demux: ${videoSamples.length} 视频样本, ${audioSamples.length} 音频样本`);
    if (this.signal?.aborted) throw new Error('已取消');
    if (videoSamples.length === 0) throw new Error('未提取到视频数据（可能是容器格式不支持）');

    // 3. Decode
    this.reportProgress('decode', 0);
    const frames = await this._decode(videoSamples, description);
    log(`解码: ${frames.length} 帧`);
    if (this.signal?.aborted) throw new Error('已取消');
    if (frames.length === 0) throw new Error('解码失败，未生成视频帧（可能是编码格式不支持）');

    // 4. Encode
    this.reportProgress('encode', 0);
    await this._encode(frames);
    log(`编码: ${this.encodedVideoChunks.length} 个数据块`);
    if (this.signal?.aborted) throw new Error('已取消');
    if (this.encodedVideoChunks.length === 0) throw new Error('编码失败，未生成输出数据');

    // 5. Audio
    if (audioSamples.length > 0 && this.options.audioBitrate > 0) {
      this.reportProgress('audio', 50);
      await this._processAudio(audioSamples);
    }

    // 6. Mux
    this.reportProgress('mux', 90);
    const blob = await this._mux();
    log(`封装: ${formatSize(blob.size)}`);
    this.reportProgress('done', 100);
    this._resolve({ blob, size: blob.size, url: URL.createObjectURL(blob) });
  }

  _readFile() {
    return new Promise((res, rej) => {
      const r = new FileReader(); r.onload = e => res(e.target.result); r.onerror = () => rej(new Error('读取失败')); r.readAsArrayBuffer(this.file);
    });
  }

  _demux(buffer) {
    return new Promise((resolve, reject) => {
      const mp4box = MP4Box.createFile();
      this._mp4boxFile = mp4box;
      const videoSamples = [], audioSamples = [];
      let desc = null, ready = false, done = false;
      const vtId = this.originalInfo.videoTrackId;
      const atId = this.originalInfo.audioTrackId;

      mp4box.onReady = (info) => {
        const vt = info.videoTracks?.[0], at = info.audioTracks?.[0];
        if (!vt) { reject(new Error('无视频轨道')); return; }
        // Extract ALL samples
        mp4box.setExtractionOptions(vt.id, null, { nbSamples: 500000 });
        if (at) mp4box.setExtractionOptions(at.id, null, { nbSamples: 500000 });
        mp4box.start(); // ← CRITICAL FIX: call start() to begin extraction!
        ready = true;
        // After start(), onSamples fires synchronously for buffered data
        // Small delay to ensure all callbacks fire
        setTimeout(() => { done = true; }, 50);
      };

      mp4box.onSamples = (trackId, user, samples) => {
        const target = trackId === vtId ? videoSamples : audioSamples;
        for (const s of samples) {
          target.push({ data: s.data, size: s.size, dts: s.dts, cts: s.cts, duration: s.duration, is_sync: s.is_sync, description: s.description });
          if (trackId === vtId && s.is_sync && s.description && !desc) desc = s.description;
        }
      };

      mp4box.onError = (err) => reject(new Error('Demux失败: ' + err));

      buffer.fileStart = 0;
      mp4box.appendBuffer(buffer);
      mp4box.flush();

      // Wait for extraction to complete
      const check = setInterval(() => {
        if (!done) return;
        clearInterval(check);
        resolve({ videoSamples, audioSamples, description: desc || this.originalInfo.description });
      }, 20);
      setTimeout(() => { clearInterval(check); reject(new Error('Demux超时')); }, 15000);
    });
  }

  async _decode(samples, description) {
    const frames = [];
    let configDone = false;

    const decoder = new VideoDecoder({
      output: (frame) => { frames.push(frame); },
      error: (err) => { console.error('Decode error:', err); log('解码错误: ' + err.message, true); },
    });
    this.videoDecoder = decoder;

    // Configure decoder - wait for it to be ready
    let codec = this.originalInfo.codec;

    // Ensure description is a valid ArrayBuffer/ArrayBufferView for WebCodecs
    let safeDesc = null;
    if (description) {
      if (description instanceof ArrayBuffer || ArrayBuffer.isView(description)) {
        safeDesc = description;
      } else if (description.buffer instanceof ArrayBuffer) {
        // e.g., mp4box returns a DataView-like object with .buffer
        safeDesc = description.buffer;
      } else if (typeof description === 'object' && description.data) {
        // mp4box sometimes wraps in { data: ArrayBuffer }
        const d = description.data;
        if (d instanceof ArrayBuffer || ArrayBuffer.isView(d)) safeDesc = d;
        else if (d?.buffer instanceof ArrayBuffer) safeDesc = d.buffer;
      }
      // If still not valid, try wrapping in Uint8Array as last resort
      if (!safeDesc && (description instanceof Array || typeof description === 'object')) {
        try { safeDesc = new Uint8Array(Object.values(description)).buffer; } catch {}
      }
    }

    // If codec is just a FOURCC (e.g., 'avc1'), try to construct a full codec string
    if (codec && !codec.includes('.') && safeDesc) {
      try {
        const dv = new DataView(safeDesc instanceof ArrayBuffer ? safeDesc : safeDesc.buffer);
        if (codec.startsWith('avc') && dv.byteLength >= 4) {
          const profile = dv.getUint8(1).toString(16).padStart(2, '0');
          const compat = dv.getUint8(2).toString(16).padStart(2, '0');
          const level = dv.getUint8(3).toString(16).padStart(2, '0');
          codec = 'avc1.' + profile + compat + level;
          log('构建解码器codec: ' + codec);
        } else if (codec.startsWith('hvc') && dv.byteLength >= 4) {
          // Simplified H.265 codec string construction
          const profile = dv.getUint8(1);
          const level = dv.getUint8(3);
          codec = 'hvc1.' + profile + '.0.L' + level + '.0';
          log('构建解码器codec: ' + codec);
        }
      } catch { /* keep original codec */ }
    }

    await new Promise((resolve, reject) => {
      try {
        const config = { codec: codec };
        if (safeDesc) config.description = safeDesc;
        log('解码器配置: codec=' + codec + ', desc=' + (safeDesc ? safeDesc.byteLength + 'B' : '无'));
        decoder.configure(config);
        configDone = true;
        resolve();
      } catch (e) {
        reject(new Error('解码器配置失败: ' + e.message));
      }
    });

    if (!configDone) throw new Error('解码器未成功配置');

    // Feed samples
    for (let i = 0; i < samples.length; i++) {
      if (this.signal?.aborted) break;
      try {
        const s = samples[i];
        const chunk = new EncodedVideoChunk({
          type: s.is_sync ? 'key' : 'delta',
          timestamp: (s.cts || s.dts || 0) * 1_000_000,
          duration: (s.duration || 1) * 1_000_000,
          data: s.data,
        });
        decoder.decode(chunk);
      } catch (e) { console.warn('Feed error at', i, ':', e.message); }

      if (i % 200 === 0) {
        this.reportProgress('decode', Math.round((i / samples.length) * 90));
        await new Promise(r => setTimeout(r, 0));
      }
    }

    await decoder.flush();
    decoder.close();
    this.videoDecoder = null;
    return frames;
  }

  async _encode(frames) {
    this.canvas = document.createElement('canvas');
    this.canvas.width = this.options.width;
    this.canvas.height = this.options.height;
    this.ctx = this.canvas.getContext('2d');

    const encoder = new VideoEncoder({
      output: (chunk, meta) => {
        const data = new Uint8Array(chunk.byteLength);
        chunk.copyTo(data);
        this.encodedVideoChunks.push({ data, byteLength: chunk.byteLength, timestamp: chunk.timestamp, duration: chunk.duration, type: chunk.type });
      },
      error: (err) => { console.error('Encode error:', err); log('编码错误: ' + err.message, true); this._reject?.(new Error('编码错误: ' + err.message)); },
    });
    this.videoEncoder = encoder;

    // Configure encoder with hardware acceleration
    await encoder.configure({
      codec: this.options.codec,
      width: this.options.width,
      height: this.options.height,
      bitrate: this.options.videoBitrate,
      framerate: this.options.fps,
      hardwareAcceleration: 'prefer-hardware',
      ...(this.options.bitrateMode === 'cbr' ? { latencyMode: 'realtime' } : {}),
    });
    log('编码器已配置: ' + this.options.codec + ' ' + this.options.width + 'x' + this.options.height + ' @ ' + formatBitrate(this.options.videoBitrate));

    const srcFps = this.originalInfo.fps || 30;
    const tgtFps = this.options.fps;
    const skip = Math.max(1, Math.round(srcFps / tgtFps));
    const frameDur = Math.round(1_000_000 / tgtFps);
    let ts = 0, cnt = 0;

    for (let i = 0; i < frames.length; i += skip) {
      if (this.signal?.aborted) break;
      try {
        const frame = frames[i];
        this.ctx.drawImage(frame, 0, 0, this.options.width, this.options.height);
        const pf = new VideoFrame(this.canvas, { timestamp: ts, duration: frameDur });
        encoder.encode(pf);
        pf.close();
        // Close frames behind us to free memory
        for (let j = i; j >= Math.max(0, i - 5); j--) { try { frames[j]?.close(); } catch {} }
      } catch (e) { /* skip */ }
      ts += frameDur; cnt++;
      if (cnt % 10 === 0) {
        this.reportProgress('encode', Math.round((cnt / Math.ceil(frames.length / skip)) * 95));
        await new Promise(r => setTimeout(r, 0));
      }
    }

    for (const f of frames) { try { f.close(); } catch {} }
    await encoder.flush();
    encoder.close();
    this.videoEncoder = null;
  }

  async _processAudio(samples) {
    const encoder = new AudioEncoder({
      output: (chunk) => { const d = new Uint8Array(chunk.byteLength); chunk.copyTo(d); this.encodedAudioChunks.push({ data: d, byteLength: chunk.byteLength, timestamp: chunk.timestamp, duration: chunk.duration, type: chunk.type }); },
      error: (e) => console.error('Audio encode:', e),
    });
    this.audioEncoder = encoder;
    await encoder.configure({ codec: 'mp4a.40.2', sampleRate: 48000, numberOfChannels: 2, bitrate: this.options.audioBitrate || 128000 });
    for (const s of samples) {
      if (this.signal?.aborted) break;
      try { encoder.encode(new EncodedAudioChunk({ type: s.is_sync ? 'key' : 'delta', timestamp: (s.cts || s.dts || 0) * 1_000_000, duration: (s.duration || 1) * 1_000_000, data: s.data })); } catch {}
    }
    await encoder.flush(); encoder.close();
  }

  async _mux() {
    const mux = MP4Box.createFile();
    const vts = this.options.fps * 1000;

    const vId = mux.addTrack({ type: 'video', width: this.options.width, height: this.options.height, timescale: vts, nb_samples: this.encodedVideoChunks.length, video: { width: this.options.width, height: this.options.height } });

    for (const c of this.encodedVideoChunks) {
      // Convert AnnexB to AVCC for mp4box.js compatibility
      const avccData = this.options.codec.includes('avc') ? annexBToAVCC(c.data.buffer) : c.data.buffer;
      mux.addSample(vId, new Uint8Array(avccData), {
        duration: Math.round((c.duration / 1_000_000) * vts),
        dts: Math.round((c.timestamp / 1_000_000) * vts),
        cts: Math.round((c.timestamp / 1_000_000) * vts),
        is_sync: c.type === 'key',
      });
    }

    if (this.encodedAudioChunks.length > 0) {
      const ats = 48000;
      const aId = mux.addTrack({ type: 'audio', timescale: ats, nb_samples: this.encodedAudioChunks.length, audio: { sample_rate: 48000, channel_count: 2, sample_size: 16 } });
      for (const c of this.encodedAudioChunks) {
        mux.addSample(aId, c.data, { duration: Math.round((c.duration / 1_000_000) * ats), dts: Math.round((c.timestamp / 1_000_000) * ats), cts: Math.round((c.timestamp / 1_000_000) * ats), is_sync: true });
      }
    }

    return new Promise((res, rej) => {
      mux.saveData = (data) => { const b = new Blob([data], { type: 'video/mp4' }); if (b.size === 0) rej(new Error('封装输出为空')); else res(b); };
      try { mux.save('file.mp4'); } catch (e) { rej(e); }
    });
  }

  reportProgress(stage, pct) { this.onProgress({ stage, percent: Math.min(99, pct) }); }

  abort() {
    this.aborted = true;
    try { this.videoDecoder?.close(); } catch {} try { this.videoEncoder?.close(); } catch {} try { this.audioEncoder?.close(); } catch {}
  }
}

// =============================================
// COMPRESSION CONTROL
// =============================================

async function startCompression(id) {
  const task = appState.queue.find(t => t.id === id);
  if (!task || task.status === 'processing') return;
  if (!task.options || !task.originalInfo?.codec) { showToast('请等待文件分析完成', 'warning'); return; }

  const px = (task.options.width||1920)*(task.options.height||1080);
  const estMem = (px*4*10)/(1024*1024);
  if (estMem > 500) { if (!confirm(`处理可能需要约 ${Math.round(estMem)} MB 内存，可能卡顿。\n建议降低分辨率。\n\n是否继续？`)) return; }

  task.status = 'processing'; task.progress = 0; task.error = null;
  task.abortController = new AbortController(); appState.processingCount++;
  renderQueue(); if (task.id === appState.selectedId) renderParamPanel(task);

  const engine = new CompressionEngine(task.file, task.options, task.originalInfo,
    (p) => { if (p.stage==='decode') task.progress=Math.round(p.percent*0.15); else if (p.stage==='encode') task.progress=Math.round(15+p.percent*0.75); else if (p.stage==='mux') task.progress=Math.round(90+p.percent*0.1); else if (p.stage==='done') task.progress=100; renderQueue(); },
    task.abortController.signal);

  try {
    const result = await engine.start();
    task.status = 'completed'; task.progress = 100;
    task.result = { blob: result.blob, url: result.url, size: result.size };
    log(`完成: ${task.file.name} → ${formatSize(result.size)}`);
    showToast(`"${task.file.name}" 压缩完成`, 'success');
  } catch (err) {
    if (err.message === '已取消') { task.status = 'pending'; task.progress = 0; }
    else { task.status = 'failed'; task.error = err.message || '未知错误'; task.progress = 0; log(`失败: ${task.file.name} - ${task.error}`, true); showToast(`"${task.file.name}" 压缩失败: ${task.error}`, 'error'); }
  }
  task.abortController = null; appState.processingCount--;
  renderQueue(); if (task.id === appState.selectedId) renderParamPanel(task);
  processNextPending();
}

function cancelCompression(id) { const t = appState.queue.find(x => x.id===id); if (t?.status==='processing' && t.abortController) t.abortController.abort(); }
function startAllCompression() { const p = appState.queue.filter(t => t.status==='pending'); if (p.length===0) { showToast('没有待处理的文件','info'); return; } if (appState.processingCount===0) startCompression(p[0].id); else showToast('已有文件正在处理','info'); }
function processNextPending() { if (appState.processingCount > 0) return; const n = appState.queue.find(t => t.status==='pending' && t.options); if (n) startCompression(n.id); }
function retryTask(id) { const t = appState.queue.find(x => x.id===id); if (!t||t.status!=='failed') return; t.status='pending';t.error=null;t.progress=0;t.result=null;renderQueue();if(t.id===appState.selectedId)renderParamPanel(t);startCompression(id); }
function downloadResult(id) { const t = appState.queue.find(x => x.id===id); if (!t?.result?.url) return; const a=document.createElement('a'); a.href=t.result.url; a.download=t.file.name.replace(/\.[^.]+$/,'')+'_compressed.mp4';document.body.appendChild(a);a.click();document.body.removeChild(a); }

// =============================================
// PREVIEW & COMPARISON
// =============================================

function updateMainContent() { const mc=document.getElementById('mainContent'),t=getSelectedTask(); if(t){mc.classList.remove('hidden');renderParamPanel(t);renderPreview(t);}else mc.classList.add('hidden'); }

function renderPreview(task) {
  const area=document.getElementById('previewArea');
  if(!task){area.innerHTML='<div class="preview-area__empty"><span>🎥</span><p>选择一个文件以预览</p></div>';return;}
  const info=task.originalInfo,url=URL.createObjectURL(task.file);task._previewUrl=url;
  area.innerHTML=`<div style="width:100%;padding:16px;"><video src="${url}" controls style="width:100%;max-height:400px;background:#000;border-radius:var(--radius);"></video>${info?`<div class="preview-area__info"><span>📐 ${info.width||'?'}×${info.height||'?'}</span><span>🎞️ ${info.fps||'?'} fps</span><span>📦 ${info.codecLabel||'?'}</span><span>⏱️ ${formatDuration(info.duration)}</span><span>💾 ${formatSize(task.file.size)}</span></div>`:''}</div>`;
}

function openCompare(id) {
  const task=appState.queue.find(t=>t.id===id); if(!task?.result) return;
  const modal=document.getElementById('compareModal'),content=document.getElementById('compareContent');
  const ou=task._previewUrl||URL.createObjectURL(task.file),cu=task.result.url,os=task.file.size,cs=task.result.size,sp=Math.round(((os-cs)/os)*100),ratio=(os/cs).toFixed(1);
  content.innerHTML=`<h3 style="margin-bottom:16px;">对比: ${escapeHtml(task.file.name)}</h3><div class="compare-container"><div class="compare-side"><h4>📁 原始</h4><video src="${ou}" controls></video></div><div class="compare-side"><h4>✅ 压缩后</h4><video src="${cu}" controls></video></div><div class="compare-stats"><div class="compare-stat"><div class="compare-stat__value">${formatSize(os)}</div><div class="compare-stat__label">原始大小</div></div><div class="compare-stat"><div class="compare-stat__value" style="color:var(--accent)">${formatSize(cs)}</div><div class="compare-stat__label">压缩后大小</div></div><div class="compare-stat"><div class="compare-stat__value saved">${sp>0?'↓':'↑'} ${Math.abs(sp)}%</div><div class="compare-stat__label">${sp>0?'节省':'增大'}</div></div><div class="compare-stat"><div class="compare-stat__value" style="color:var(--accent)">${ratio}x</div><div class="compare-stat__label">压缩比</div></div></div></div><h4 style="margin:16px 0 8px;">滑块对比</h4><div class="slider-compare" id="sliderCompare"><video src="${ou}" controls style="width:100%;"></video><div class="slider-compare__top"><video src="${cu}" style="width:100%;" muted></video></div><div class="slider-compare__handle" id="sliderHandle"></div></div>`;
  modal.classList.remove('hidden');
  setTimeout(()=>{const s=document.getElementById('sliderCompare'),h=document.getElementById('sliderHandle');if(!s||!h)return;let d=false;h.addEventListener('mousedown',()=>{d=true;});document.addEventListener('mouseup',()=>{d=false;});document.addEventListener('mousemove',(e)=>{if(!d)return;const r=s.getBoundingClientRect(),x=Math.max(0,Math.min(1,(e.clientX-r.left)/r.width));const t=s.querySelector('.slider-compare__top');if(t)t.style.clipPath=`inset(0 ${(1-x)*100}% 0 0)`;h.style.left=`${x*100}%`;});},100);
}
function closeCompare() { const m=document.getElementById('compareModal');m.classList.add('hidden');m.querySelectorAll('video').forEach(v=>v.pause()); }

// =============================================
// DRAG & DROP
// =============================================

function setupDragDrop() {
  const dz=document.getElementById('dropZone'),fi=document.getElementById('fileInput'),fsb=document.getElementById('fileSelectBtn');
  fsb.addEventListener('click',()=>fi.click());
  fi.addEventListener('change',()=>{if(fi.files.length>0){addFiles(Array.from(fi.files));fi.value='';}});
  dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('active');});
  dz.addEventListener('dragleave',()=>dz.classList.remove('active'));
  dz.addEventListener('drop',e=>{e.preventDefault();dz.classList.remove('active');const fs=Array.from(e.dataTransfer.files).filter(f=>f.type.startsWith('video/')||isValidVideoFile(f));if(fs.length>0)addFiles(fs);});
  document.addEventListener('paste',e=>{const fs=Array.from(e.clipboardData.items).filter(i=>i.kind==='file').map(i=>i.getAsFile()).filter(f=>f?.type.startsWith('video/'));if(fs.length>0)addFiles(fs);});
}

// =============================================
// ERROR HANDLING
// =============================================

window.addEventListener('error',e=>{console.error('Global:',e.error);});
window.addEventListener('unhandledrejection',e=>{console.error('Rejection:',e.reason);});
window.addEventListener('beforeunload',e=>{if(appState.queue.some(t=>t.status==='processing')){e.preventDefault();e.returnValue='有正在压缩的文件，确定要离开吗？';return e.returnValue;}});

// =============================================
// INIT
// =============================================

async function init() {
  compatibilityResult = await checkCompatibility();
  updateBrowserStatus(compatibilityResult);
  showCompatBanner(compatibilityResult);
  if (!compatibilityResult.supported) { document.getElementById('dropZone').style.opacity='0.5';document.getElementById('dropZone').style.pointerEvents='none';return; }
  setupDragDrop();
  document.getElementById('startAllBtn').addEventListener('click',startAllCompression);
  document.getElementById('clearQueueBtn').addEventListener('click',()=>{appState.queue=appState.queue.filter(t=>t.status!=='completed'&&t.status!=='failed');if(!appState.queue.find(t=>t.id===appState.selectedId))appState.selectedId=appState.queue[0]?.id||null;renderQueue();updateMainContent();});
  document.getElementById('closeCompare').addEventListener('click',closeCompare);
  document.querySelector('.modal__backdrop')?.addEventListener('click',closeCompare);
  log('就绪 | ' + compatibilityResult.codecs.filter(c=>c.hardwareAccelerated).length + ' 个 GPU 编码器可用');
  document.getElementById('browserStatus').textContent = 'Chrome ✅ | ' + compatibilityResult.codecs.filter(c=>c.hardwareAccelerated).length + ' 个 GPU 编码器可用';
}

document.addEventListener('DOMContentLoaded', init);
</script>
